<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay button {
      font-size: 24px;
      padding: 20px 40px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      background: #fff;
      font-weight: bold;
    }
    #popup {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 16px;
      pointer-events: none;
    }
    #popup p {
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      text-shadow: 2px 2px 8px #000;
      text-align: center;
      padding: 0 20px;
    }
    #popup img {
      width: 300px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <button onclick="start()">Click to continue</button>
  </div>

  <video id="vid" loop muted playsinline>
    <source src="rickroll.mp4" type="video/mp4" />
  </video>
  <audio id="aud" loop>
    <source src="audio.m4a" type="audio/mp4" />
  </audio>

  <!-- POPUP SOUND: replace popup.mp3 with your sound file name -->
  <audio id="popupsound">
    <source src="popup.mp3" type="audio/mp4" />
  </audio>

  <div id="popup">
    <p>you've been rickrolled by neatvigo HAHAHA</p>
    <img src="https://media1.tenor.com/m/bgBQwUxX8VkAAAAd/cat-meme-laughing-gif.gif" alt="lol" />
  </div>

  <script>
    function start() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('vid').play();
      document.getElementById('aud').play();
      setTimeout(() => {
        document.getElementById('popup').style.display = 'flex';
        document.getElementById('popupsound').play();
      }, 3000);
    }
  </script>

</body>
</html>
